version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: continuum-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: continuum
      POSTGRES_PASSWORD: continuum_secret
      POSTGRES_DB: continuum_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continuum -d continuum_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: continuum-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://continuum:continuum_secret@db:5432/continuum_db
      JWT_SECRET: ${JWT_SECRET:-continuum-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-continuum-refresh-secret-change-in-production}
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d
      GROQ_API_KEY: ${GROQ_API_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3000}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
